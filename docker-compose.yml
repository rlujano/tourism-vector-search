services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile

    container_name: backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/app:/app
      - ./backend/ai_models:/app/ai_models
      - ./backend/indexes:/app/indexes
    env_file:
      - .env
    depends_on:
      - db
    networks:
      - vector-network
    restart: unless-stopped
  # frontend:
  #   build:
  #     context: ./frontend
  #   container_name: frontend
  #   ports:
  #     - "5173:5173"
  #   volumes:
  #     - ./frontend:/app
  #     - /app/node_modules
  #   depends_on:
  #     - backend
  #   networks:
  #     - vector-network
  #   restart: unless-stopped
  db:
    image: mariadb:10.11
    container_name: mariadb
    ports:
      - "3306:3306"
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    networks:
      - vector-network
    restart: unless-stopped
  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
    depends_on:
      - db
    networks:
      - vector-network
    restart: unless-stopped
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    ports:
      - "5678:5678"
    environment:
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - backend
    networks:
      - vector-network
    restart: unless-stopped
volumes:
  mariadb_data:
  ai_models:
  vector_indexes:
  n8n_data:
networks:
  vector-network:
    driver: bridge